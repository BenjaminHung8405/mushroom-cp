##--------------------------------------------------------------------
## EMQX Configuration - Minimal (EMQX 5.3.0)
##--------------------------------------------------------------------

## Node configuration
node.name = "emqx@127.0.0.1"
node.cookie = "emqx_secret_cookie"
node.data_dir = "/opt/emqx/data"

## MQTT listeners
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

## Enable Dashboard & REST API
dashboard {
  listeners.http {
    bind = 18083
  }
}

## Enable File-based Authorization using acl.conf
authorization {
  no_match = deny
  deny_action = ignore
  sources = [
    {
      type = file
      enable = true
      path = "etc/acl.conf"
    }
  ]
}


