%% =====================================================================
%% EMQX File-Based Authorization Rules (acl.conf)
%% Format: {Permission, Who, Action, [Topics]}.
%%
%% Processing: Top-to-bottom, first-match wins.
%% Default: no_match = deny (set in emqx.conf)
%%
%% Accounts:
%%   nestjs_backend      - NestJS server; full mushroom/# subscribe + setpoint publish
%%   esp32_mushroom_*    - Field device; restricted to own topics only
%%
%% Topic Tree:
%%   mushroom/device/{deviceId}/telemetry   <- ESP32 publishes sensor data
%%   mushroom/device/{deviceId}/status      <- ESP32 publishes online/offline (LWT)
%%   mushroom/device/{deviceId}/setpoint    <- Backend publishes control commands
%% =====================================================================

%% ------------------------------------------------------------
%% RULE 1: NestJS Backend - Full subscriber (collects all telemetry)
%% ------------------------------------------------------------
{allow, {username, "nestjs_backend"}, subscribe, ["mushroom/#"]}.

%% RULE 2: NestJS Backend - Publishes setpoint commands to all devices
{allow, {username, "nestjs_backend"}, publish, ["mushroom/device/+/setpoint"]}.

%% ------------------------------------------------------------
%% RULE 3: ESP32 Device - Can only PUBLISH to its OWN telemetry topic
%%
%% ${username} is replaced at runtime with the connecting device's username.
%% e.g., esp32_mushroom_s3_01 can only publish to:
%%   mushroom/device/esp32_mushroom_s3_01/telemetry
%% This prevents a compromised device from injecting fake data for other devices.
%% ------------------------------------------------------------
{allow, all, publish, ["mushroom/device/${username}/telemetry"]}.

%% RULE 4: ESP32 Device - Can only PUBLISH to its OWN status topic (for LWT + online broadcast)
{allow, all, publish, ["mushroom/device/${username}/status"]}.

%% RULE 5: ESP32 Device - Can only SUBSCRIBE to its OWN setpoint (control commands) topic
{allow, all, subscribe, ["mushroom/device/${username}/setpoint"]}.

%% ------------------------------------------------------------
%% RULE 6: DENY ALL - Any access not matched above is rejected.
%%
%% This is the security backstop. Any attempt to access topics
%% not explicitly allowed above will be denied here.
%% Note: 'pubsub' is NOT valid in EMQX 5 file authz — use separate rules.
%% Note: This is redundant with no_match=deny in emqx.conf but
%% is included as an explicit, documented policy statement.
%% ------------------------------------------------------------
{deny, all, publish, ["#"]}.
{deny, all, subscribe, ["#"]}.
