services:
  # ==========================================
  # 1. DATABASE: PostgreSQL + TimescaleDB
  # ==========================================
  mushroom-db:
    image: timescale/timescaledb:latest-pg15
    container_name: mushroom_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mushroom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mushroom_iot_db}
    volumes:
      - ${DATA_PATH:-./data}/mushroom_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mushroom_user} -d ${POSTGRES_DB:-mushroom_iot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mushroom-network
    # NOTE: Port 5432 is NOT exposed to host. DB is only reachable
    # from within the mushroom-network Docker bridge network.

  # ==========================================
  # 2. MQTT BROKER: Mosquitto (password + ACL)
  # ==========================================
  mushroom-mqtt:
    image: iegomez/mosquitto-go-auth:latest
    container_name: mushroom_mqtt
    restart: always
    env_file:
      - .env
    ports:
      - "${MQTT_TCP_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
      - ${DATA_PATH:-./data}/mushroom_mosquitto_data:/mosquitto/data
      - ${DATA_PATH:-./data}/mushroom_mosquitto_log:/mosquitto/log
    healthcheck:
      test: ['CMD-SHELL', 'timeout 2 mosquitto_sub -h 127.0.0.1 -p 1883 -t "$SYS/broker/version" -C 1 >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - mushroom-network

  # ==========================================
  # 3. TIME-SERIES DATABASE: InfluxDB v2
  # ==========================================
  mushroom-influxdb:
    image: influxdb:2.7-alpine
    container_name: mushroom_influxdb
    restart: always
    env_file:
      - .env
    ports:
      - "${INFLUXDB_HOST_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - ${DATA_PATH:-./data}/mushroom_influxdb_data:/var/lib/influxdb2
      - ${DATA_PATH:-./data}/mushroom_influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mushroom-network

  # ==========================================
  # 4. BACKEND: NestJS Application
  # ==========================================
  mushroom-backend:
    build:
      context: ./mushroom-backend
      dockerfile: Dockerfile
    container_name: mushroom_backend
    restart: always
    ports:
      - "${BE_HOST_PORT:-6002}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CI=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mushroom_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@mushroom-db:5432/${POSTGRES_DB:-mushroom_iot_db}
      - MQTT_HOST=mushroom-mqtt
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_BACKEND_USER:-nestjs_backend}
      - MQTT_PASSWORD=${MQTT_BACKEND_PASS:?MQTT_BACKEND_PASS is required}
      - OFFLINE_SYNC_MQTT_URL=mqtt://mushroom-mqtt:1883
      - OFFLINE_SYNC_MQTT_USERNAME=${MQTT_BACKEND_USER:-nestjs_backend}
      - OFFLINE_SYNC_MQTT_PASSWORD=${MQTT_BACKEND_PASS:?MQTT_BACKEND_PASS is required}
      - OFFLINE_SYNC_MQTT_CLIENT_ID=${OFFLINE_SYNC_MQTT_CLIENT_ID:-mushroom_offline_sync}
      - INFLUXDB_URL=http://mushroom-influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-mushroom}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:?INFLUXDB_BUCKET is required}
      - INFLUXDB_ANALYTICS_BUCKET=${INFLUXDB_ANALYTICS_BUCKET:?INFLUXDB_ANALYTICS_BUCKET is required}
    depends_on:
      mushroom-db:
        condition: service_healthy
      mushroom-influxdb:
        condition: service_healthy
      mushroom-mqtt:
        condition: service_healthy
    networks:
      - mushroom-network
    volumes:
      - ./mushroom-backend:/usr/src/app
      - /usr/src/app/node_modules

  # ==========================================
  # 5. FRONTEND: Next.js (mushroom-ui)
  # ==========================================
  mushroom-ui:
    build:
      context: ./mushroom-ui
      dockerfile: Dockerfile
    container_name: mushroom_ui
    restart: always
    ports:
      - "${UI_HOST_PORT:-6001}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CI=true
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:6002}
      - API_INTERNAL_URL=http://mushroom-backend:3001
      - NEXT_PUBLIC_DEVICE_ID=${NEXT_PUBLIC_DEVICE_ID:-}
    depends_on:
      - mushroom-backend
    networks:
      - mushroom-network

networks:
  mushroom-network:
    driver: bridge
