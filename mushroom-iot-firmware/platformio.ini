; ==============================================================================
; PlatformIO Configuration — Mushroom IoT Firmware
; Board: MKE-K01 ESP32-S3 Dev Kit (tương thích ESP32-S3-DevKitC-1)
; Variant: N16R8 — 16MB Flash QIO + 8MB PSRAM OPI
;
; Board có 2 cổng USB vật lý — chọn đúng cổng là quan trọng nhất:
;
;  ┌─────────────────────────────────────────────────────────────────┐
;  │  Cổng A: USB-to-UART (CH343P)                                   │
;  │  → macOS nhận dạng: /dev/cu.usbserial-XXXXXXXX                  │
;  │  → Dùng cho: nạp firmware (esptool) + Serial monitor            │
;  │  → Không cần ARDUINO_USB_CDC_ON_BOOT hay ARDUINO_USB_MODE       │
;  │  → ĐÂY LÀ CỔNG KHUYẾN NGHỊ cho IoT thông thường                │
;  ├─────────────────────────────────────────────────────────────────┤
;  │  Cổng B: USB OTG (native ESP32-S3)                              │
;  │  → macOS nhận dạng: /dev/cu.usbmodem-XXXXXXXX                   │
;  │  → Dùng cho: nạp firmware qua USB CDC / USB Device features     │
;  │  → CẦN ARDUINO_USB_MODE=1 + ARDUINO_USB_CDC_ON_BOOT=1          │
;  └─────────────────────────────────────────────────────────────────┘
;
; Log upload của bạn thấy "/dev/cu.usbmodem..." → đang dùng Cổng B (OTG).
; Config này hỗ trợ cả hai, xem env:uart và env:otg bên dưới.
; ==============================================================================

[platformio]
default_envs = otg   ; ← Đổi thành "otg" nếu bạn cắm vào cổng OTG

; ==============================================================================
; [BASE] — Cấu hình dùng chung cho cả hai env
; ==============================================================================
[env:base]
platform  = espressif32@6.5.0
board     = esp32-s3-devkitc-1
; ESP-IDF owns /sdkconfig so rollback and core-dump settings are
; compiled into the image rather than being ineffective application macros.
framework = arduino, espidf
lib_ldf_mode = deep
extra_scripts =
    pre:scripts/load_next_public_api_url.py
    scripts/link_arduino_sdk_littlefs.py


; --- Build debug để esp32_exception_decoder decode stack trace ---
build_type = debug

; --- Flash & PSRAM cho N16R8 ---
; ESP32-S3-WROOM-1 N16R8: Flash QIO 16MB + PSRAM OPI 8MB
; GPIO35/36/37 bị chiếm bởi Flash/PSRAM nội — KHÔNG dùng ngoài
board_build.arduino.memory_type = qio_opi   ; Flash QIO + PSRAM OPI
board_build.esp-idf.sdkconfig_path = sdkconfig.esp32s3_n16r8
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = partitions/partitions.csv

; --- Monitor common ---
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder   ; Giải mã crash address → file.cpp:dòng
    time                      ; Timestamp mỗi dòng log

; --- Build flags chung ---
build_flags =
    -D CORE_DEBUG_LEVEL=3   ; ERROR/WARN/INFO — avoids stack overflow on verbose HTTP logging
    -D BOARD_HAS_PSRAM      ; Kích hoạt psram_malloc trong Arduino framework
    -D MQTT_SOCKET_TIMEOUT=15 ; MQTT CONNACK timeout in seconds
    -D MQTT_TRANSPORT_PLAIN=1 ; Cloud port 10883 is plaintext MQTT; TLS is opt-in
    -D MQTT_MAX_PACKET_SIZE=2048 ; Buffer nhận gói tin OTA payload lớn từ MQTT Broker
    ; The ESP-IDF package is missing the external LittleFS Kconfig component,
    ; while Arduino's wrapper gates its implementation on this macro.
    -D CONFIG_LITTLEFS_PAGE_SIZE=256
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32-3.20014.231204/tools/sdk/esp32s3/include/esp_littlefs/include

; --- Lib deps chung ---
lib_deps =
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    bblanchon/ArduinoJson @ ^6.21.3
    tzapu/WiFiManager @ ^2.0.17

; ==============================================================================
; [ENV: UART] — Cắm vào cổng USB-to-UART (CH343P)
; macOS port: /dev/cu.usbserial-*
; Đây là cách đơn giản nhất, Serial.println() hoạt động ngay.
; ==============================================================================
[env:uart]
extends = env:base
; monitor_dtr=1: toggle DTR để reset board → bắt được toàn bộ boot log
; monitor_rts=0: không toggle RTS
monitor_dtr = 1
monitor_rts = 0
; Không cần USB CDC flags — CH343P bridge UART0 thẳng ra máy tính
build_flags =
    ${env:base.build_flags}
    ; Không có ARDUINO_USB_CDC_ON_BOOT / ARDUINO_USB_MODE
    ; → Serial mặc định đi qua UART0 → CH343P → máy tính

; ==============================================================================
; [ENV: OTG] — Cắm vào cổng USB OTG (native ESP32-S3)
; macOS port: /dev/cu.usbmodem-*
; Dùng khi bạn muốn dùng native USB hoặc chỉ có 1 cáp cắm vào OTG.
; ==============================================================================
[env:otg]
extends = env:base
; monitor_dtr=0: KHÔNG toggle DTR khi monitor mở
; Lý do: native USB OTG cần re-enumerate sau reset (~1-2s);
;        nếu monitor toggle DTR ngay, nó sẽ reset lại board lần 2
;        trước khi USB kịp enumerate → miss toàn bộ boot log
monitor_dtr = 0
monitor_rts = 0
build_flags =
    ${env:base.build_flags}
    -D ARDUINO_USB_MODE=1        ; Dùng hardware USB (USB-Serial/JTAG)
    -D ARDUINO_USB_CDC_ON_BOOT=1 ; Route Serial → USB CDC endpoint
