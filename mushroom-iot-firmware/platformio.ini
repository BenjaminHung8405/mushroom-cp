[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1     ; <-- THÊM DÒNG NÀY: Chuyển Serial sang cổng USB OTG
    -D ARDUINO_USB_MODE=1            ; <-- THÊM DÒNG NÀY: Chế độ USB phù hợp
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    knolleary/PubSubClient @ ^2.8
    tzapu/WiFiManager @ ^2.0.17