server {
    listen 80;
    server_name localhost;

    # Handle Backend API requests
    location /api/ {
        proxy_pass http://mushroom-backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering and set infinite timeout for SSE (Server-Sent Events)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    # Handle Frontend static assets / pages / Hot Module Replacement (HMR)
    location / {
        proxy_pass http://mushroom-ui:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Standard map block to handle WebSockets correctly
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
